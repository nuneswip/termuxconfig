"$schema" = "https://starship.rs/config-schema.json"

# Available palettes:
# - monochrome
palette = "monochrome"

format = "\\[$directory$git_branch$git_status\\] $character"
add_newline = false

[directory]
truncation_symbol = "’ü╝ "
truncation_length = 2
truncate_to_repo = true
style = "fg:frost"
format = "[$path]($style)"

[git_branch]
symbol = "’Éś"
style = "fg:spark"
format = " | [[$symbol $branch](fg:spark)]($style)"

[git_status]
format = "$all_status$ahead_behind"
conflicted = " | [ŅĄŹ $count](fg:nova)"
ahead = " | [’üó $count](fg:nova)"
behind = " | [’üŻ $count](fg:nova)"
diverged = " | [’üó $ahead_count ’üŻ $behind_count](fg:nova)"
untracked = " | [¾░×ŗ $count](fg:nova)"
stashed = " | [¾░Æ▓ $count](fg:nova)"
modified = " | [¾░Å½ $count](fg:nova)"
staged = " | [¾░▒Æ $count](fg:nova)"
renamed = " | [¾░üĢ $count](fg:nova)"
deleted = " | [¾░ŹĄ $count](fg:nova)"

[character]
disabled = false
success_symbol = "[\\$](fg:lime)"
error_symbol = "[\\$](fg:ember)"
vimcmd_symbol = "[\\$](fg:lime)"
vimcmd_replace_one_symbol = "[\\$](fg:iris)"
vimcmd_replace_symbol = "[\\$](fg:iris)"
vimcmd_visual_symbol = "[\\$](fg:spark)"

[palettes.monochrome]
# Accent Colors
lychee  = "#f5f5f5"
guava   = "#eaeaea"
fizz    = "#e0e0e0"
nebula  = "#d6d6d6"
ember   = "#cccccc"
cinder  = "#c2c2c2"
torch   = "#b8b8b8"
spark   = "#aeaeae"
lime    = "#a4a4a4"
surge   = "#9a9a9a"
pulse   = "#909090"
frost   = "#868686"
nova    = "#7c7c7c"
iris    = "#727272"

# Base Colors
text    = "#ffffff"
sub1    = "#f0f0f0"
sub0    = "#dcdcdc"
ov2     = "#c8c8c8"
ov1     = "#b4b4b4"
ov0     = "#a0a0a0"
